version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: cryomedics-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-cryomedics_secret}
      POSTGRES_DB: ${DB_NAME:-cryomedics}
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      
  pgadmin:
    image: dpage/pgadmin4
    container_name: cryomedics-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@cryomedics.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  db_data:
